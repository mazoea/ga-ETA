on:
  push:
  workflow_dispatch:
  pull_request:
    types: [review_requested, edited]
  pull_request_review:
    types: [submitted]

name: Test

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ./
      with:
        CONTEXT_GITHUB: ${{ toJson(github) }}